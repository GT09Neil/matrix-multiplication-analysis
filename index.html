<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Algo Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --case1: #38bdf8;
            --case2: #fb7185;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.8rem;
            margin: 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .controls {
            display: flex;
            gap: 2rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
            background: rgba(15, 23, 42, 0.3);
            padding: 1.5rem;
            border-radius: 1rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        label {
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        select, input[type="file"] {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 0.7rem 1.2rem;
            border-radius: 0.6rem;
            outline: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }

        select:hover, input[type="file"]:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        .chart-wrapper {
            position: relative;
            height: 500px;
            width: 100%;
            background: rgba(15, 23, 42, 0.2);
            border-radius: 1rem;
            padding: 1rem;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.7));
            padding: 1.5rem;
            border-radius: 1.2rem;
            border: 1px solid rgba(255,255,255,0.03);
            text-align: left;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.2);
        }

        .stat-val {
            display: block;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 0.2rem;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 500;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Matrix Multiplication Analytics</h1>
            <p style="color: #64748b; font-size: 1.1rem;">Dashboard de comparación de algoritmos y tiempos de ejecución</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <label>1. Cargar reporte CSV</label>
                <input type="file" id="csvFile" accept=".csv">
            </div>
            
            <div class="control-group">
                <label>2. Filtrar por tamaño</label>
                <select id="sizeFilter">
                    <option value="">Esperando archivo...</option>
                </select>
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="resultsChart"></canvas>
        </div>

        <div id="summary" class="stats-summary" style="display: none;">
            <div class="stat-card">
                <span class="stat-label">Algoritmo más eficiente</span>
                <span id="fastestAlgo" class="stat-val">-</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Tiempo récord (ms)</span>
                <span id="bestTime" class="stat-val">-</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Total Algoritmos</span>
                <span id="totalAlgos" class="stat-val">-</span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
